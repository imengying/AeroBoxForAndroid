name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v') && github.event.created == true && github.event.deleted == false && github.event.forced == false
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 29.0.14206865
      GOMOBILE_VERSION: v0.1.12
      LIBBOX_BUILD_TAGS: with_gvisor,with_quic,with_utls,with_v2ray_api,with_naive_outbound

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
          cache: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"

      - name: Set up Android SDK
        run: bash .github/scripts/setup-android-sdk.sh

      - name: Install required Android SDK packages
        run: bash .github/scripts/install-android-packages.sh

      - name: Resolve latest stable sing-box release
        run: bash .github/scripts/resolve-sing-box-version.sh

      - name: Build libbox.aar
        run: bash .github/scripts/build-libbox.sh

      - name: Validate and decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || \
             [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || \
             [ -z "${ANDROID_KEY_ALIAS:-}" ] || \
             [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "::error::Missing Android release signing secrets"
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          echo "AEROBOX_KEYSTORE_PATH=${RUNNER_TEMP}/release.jks" >> "${GITHUB_ENV}"

      - name: Derive version from tag
        run: |
          set -euo pipefail
          echo "AEROBOX_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION_NAME}" ] || [ "${VERSION_NAME}" = "${GITHUB_REF_NAME}" ]; then
            echo "::error::Invalid tag format: ${GITHUB_REF_NAME}. Expected v1.2.3"
            exit 1
          fi

          BASE_VERSION="${VERSION_NAME%%[-+]*}"
          IFS='.' read -r -a VERSION_PARTS <<< "${BASE_VERSION}"
          if [ "${#VERSION_PARTS[@]}" -lt 1 ] || [ "${#VERSION_PARTS[@]}" -gt 3 ]; then
            echo "::error::Tag must be numeric semver, e.g. v1.2.3"
            exit 1
          fi

          for part in "${VERSION_PARTS[@]}"; do
            if ! [[ "${part}" =~ ^[0-9]+$ ]]; then
              echo "::error::Tag must be numeric semver, e.g. v1.2.3"
              exit 1
            fi
          done

          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]:-0}"
          PATCH="${VERSION_PARTS[2]:-0}"
          VERSION_CODE=$((10#${MAJOR} * 10000 + 10#${MINOR} * 100 + 10#${PATCH}))

          echo "AEROBOX_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "AEROBOX_VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"

      - name: Prepare bundled routing rule-set assets
        run: bash .github/scripts/prepare-geo-assets.sh

      - name: Build unsigned release APK
        env:
          AEROBOX_VERSION_NAME: ${{ env.AEROBOX_VERSION_NAME }}
          AEROBOX_VERSION_CODE: ${{ env.AEROBOX_VERSION_CODE }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=(
            "-PAEROBOX_VERSION_NAME=${AEROBOX_VERSION_NAME}"
            "-PAEROBOX_VERSION_CODE=${AEROBOX_VERSION_CODE}"
          )
          gradle --stacktrace :app:assembleRelease "${EXTRA_ARGS[@]}"

      - name: Sign release APKs (v3 only)
        env:
          KEYSTORE_PATH: ${{ env.AEROBOX_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          SRC_DIR="${GITHUB_WORKSPACE}/app/build/outputs/apk/release"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/36.0.0/apksigner"
          if [ ! -x "${APKSIGNER}" ]; then
            echo "::error::apksigner not found at ${APKSIGNER}"
            exit 1
          fi

          shopt -s nullglob
          APKS=("${SRC_DIR}"/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No APK files found in ${SRC_DIR}"
            exit 1
          fi

          for apk in "${APKS[@]}"; do
            signed_apk="${apk%.apk}-signed.apk"
            "${APKSIGNER}" sign \
              --ks "${KEYSTORE_PATH}" \
              --ks-key-alias "${KEY_ALIAS}" \
              --ks-pass env:KEYSTORE_PASSWORD \
              --key-pass env:KEY_PASSWORD \
              --v1-signing-enabled false \
              --v2-signing-enabled false \
              --v3-signing-enabled true \
              --v4-signing-enabled false \
              --out "${signed_apk}" \
              "${apk}"

            mv -f "${signed_apk}" "${apk}"
          done

      - name: Rename APKs
        env:
          AEROBOX_VERSION_NAME: ${{ env.AEROBOX_VERSION_NAME }}
        run: |
          set -euo pipefail
          SRC_DIR="${GITHUB_WORKSPACE}/app/build/outputs/apk/release"
          DIST_DIR="${SRC_DIR}/dist"
          mkdir -p "${DIST_DIR}"
          shopt -s nullglob
          APKS=("${SRC_DIR}"/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No APK files found in ${SRC_DIR}"
            exit 1
          fi

          for apk in "${APKS[@]}"; do
            filename="$(basename "${apk}")"
            abi="universal"
            case "${filename}" in
              *arm64-v8a*) abi="arm64-v8a" ;;
              *armeabi-v7a*) abi="armeabi-v7a" ;;
              *x86_64*) abi="x86_64" ;;
              *x86*) abi="x86" ;;
            esac
            cp -f "${apk}" "${DIST_DIR}/AeroBox-${AEROBOX_VERSION_NAME}-${abi}.apk"
          done

          echo "Renamed APK outputs:"
          ls -la "${DIST_DIR}"

      - name: Debug logs on failure
        if: failure()
        run: |
          set +e
          echo "========== libbox.aar =========="
          ls -la "${GITHUB_WORKSPACE}/app/build/libbox/" || true
          echo "========== app/build/outputs =========="
          if [ -d "${GITHUB_WORKSPACE}/app/build/outputs" ]; then
            find "${GITHUB_WORKSPACE}/app/build/outputs" -maxdepth 5 -print | sort
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: aerobox-release-${{ env.AEROBOX_VERSION_NAME || github.ref_name || github.run_number }}
          path: |
            app/build/outputs/apk/release/dist/*.apk
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ env.AEROBOX_TAG || github.ref_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh --version

          shopt -s nullglob
          APKS=(app/build/outputs/apk/release/dist/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No APK files found for release upload"
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_NAME}"
            gh release upload "${RELEASE_TAG}" "${APKS[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${APKS[@]}" \
              --title "${RELEASE_NAME}" \
              --notes ""
          fi
