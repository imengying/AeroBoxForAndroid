name: Tag Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      SING_BOX_VERSION: v1.13.0
      ANDROID_NDK_VERSION: 28.2.13676358
      LIBBOX_BUILD_TAGS: with_conntrack,with_gvisor,with_quic,with_wireguard,with_utls,with_clash_api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 (libbox)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;${ANDROID_NDK_VERSION}"
          echo "AEROBOX_ANDROID_NDK=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Build libbox.aar
        run: |
          set -euo pipefail
          export ANDROID_NDK_HOME="${AEROBOX_ANDROID_NDK}"
          export ANDROID_NDK_ROOT="${AEROBOX_ANDROID_NDK}"
          export NDK="${AEROBOX_ANDROID_NDK}"
          go install github.com/sagernet/gomobile/cmd/gomobile@v0.1.4
          go install github.com/sagernet/gomobile/cmd/gobind@v0.1.4
          export PATH="$(go env GOPATH)/bin:${PATH}"
          gomobile init

          git clone --depth 1 --branch "${SING_BOX_VERSION}" https://github.com/SagerNet/sing-box.git "${RUNNER_TEMP}/sing-box"
          pushd "${RUNNER_TEMP}/sing-box"

          # Align libbox feature set with Neko-style aggressive profile to reduce .so size.
          BUILD_LIBBOX_MAIN="cmd/internal/build_libbox/main.go"
          if [ ! -f "${BUILD_LIBBOX_MAIN}" ]; then
            echo "Cannot find ${BUILD_LIBBOX_MAIN}" >&2
            exit 1
          fi
          python3 -c 'import re,sys;from pathlib import Path;path=Path(sys.argv[1]);tags=[t.strip() for t in sys.argv[2].split(",") if t.strip()];source=path.read_text(encoding="utf-8");replacement="sharedTags = append(sharedTags, " + ", ".join(f"\"{t}\"" for t in tags) + ")";patched,count=re.subn(r"sharedTags\\s*=\\s*append\\(\\s*sharedTags\\s*,\\s*[^)]*\\)",replacement,source,count=1);assert count==1, f"Failed to patch sharedTags in {path}";path.write_text(patched,encoding="utf-8");print(replacement)' "${BUILD_LIBBOX_MAIN}" "${LIBBOX_BUILD_TAGS}"
          grep -n "sharedTags = append" "${BUILD_LIBBOX_MAIN}" | head -n 1

          # Strip debug symbols from Go binary to reduce .so size by ~20-30%
          export CGO_LDFLAGS="-s -w"
          export GOFLAGS="-ldflags=-s -ldflags=-w"

          go run ./cmd/internal/build_libbox -target android 2>&1 | tee "${RUNNER_TEMP}/libbox-build.log"
          AAR_PATH="$(find . -type f -name 'libbox.aar' | head -n 1)"
          if [ -z "${AAR_PATH}" ]; then
            echo "libbox.aar was not generated." >&2
            exit 1
          fi

          # Strip native libs inside the AAR for additional size reduction
          echo "--- stripping native libs in AAR ---"
          STRIP_DIR="${RUNNER_TEMP}/aar_strip"
          mkdir -p "${STRIP_DIR}"
          unzip -q "${AAR_PATH}" -d "${STRIP_DIR}"
          find "${STRIP_DIR}/jni" -name '*.so' -exec "${AEROBOX_ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-unneeded {} \;
          echo "--- libbox native sizes after strip ---"
          find "${STRIP_DIR}/jni" -name '*.so' -print0 | while IFS= read -r -d '' so; do
            size_kb="$(du -k "${so}" | cut -f1)"
            echo "${size_kb} KB  ${so#${STRIP_DIR}/}"
          done | sort -n
          pushd "${STRIP_DIR}"
          zip -q -r "${GITHUB_WORKSPACE}/app/libs/libbox.aar" .
          popd

          popd

      - name: Decode signing keystore (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.jks"
            echo "AEROBOX_KEYSTORE_PATH=${RUNNER_TEMP}/release.jks" >> "${GITHUB_ENV}"
          else
            echo "No signing keystore configured, will build unsigned release APK."
          fi

      - name: Derive version from tag
        run: |
          set -euo pipefail
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION_NAME}" ] || [ "${VERSION_NAME}" = "${GITHUB_REF_NAME}" ]; then
            echo "Invalid tag format: ${GITHUB_REF_NAME}. Expected v1 / v1.2 / v1.2.3 (optional -suffix/+meta)." >&2
            exit 1
          fi

          BASE_VERSION="${VERSION_NAME%%[-+]*}"
          IFS='.' read -r -a VERSION_PARTS <<< "${BASE_VERSION}"
          if [ "${#VERSION_PARTS[@]}" -lt 1 ] || [ "${#VERSION_PARTS[@]}" -gt 3 ]; then
            echo "Tag must be numeric semver, for example v1.2.3" >&2
            exit 1
          fi

          for part in "${VERSION_PARTS[@]}"; do
            if ! [[ "${part}" =~ ^[0-9]+$ ]]; then
              echo "Tag must be numeric semver, for example v1.2.3" >&2
              exit 1
            fi
          done

          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]:-0}"
          PATCH="${VERSION_PARTS[2]:-0}"

          VERSION_CODE=$((10#${MAJOR} * 10000 + 10#${MINOR} * 100 + 10#${PATCH}))
          echo "AEROBOX_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "AEROBOX_VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"

      - name: Prepare bundled GeoIP/GeoSite assets
        run: |
          set -euo pipefail
          ASSET_DIR="${GITHUB_WORKSPACE}/app/src/main/assets/sing-box"
          rm -rf "${ASSET_DIR}"
          mkdir -p "${ASSET_DIR}"

          get_latest_release() {
            curl --silent "https://api.github.com/repos/$1/releases/latest" \
              | grep '"tag_name":' \
              | sed -E 's/.*"([^"]+)".*/\1/'
          }

          GEOIP_TAG="$(get_latest_release "SagerNet/sing-geoip")"
          GEOSITE_TAG="$(get_latest_release "SagerNet/sing-geosite")"
          if [ -z "${GEOIP_TAG}" ] || [ -z "${GEOSITE_TAG}" ]; then
            echo "Failed to resolve geo asset versions." >&2
            exit 1
          fi

          echo -n "${GEOIP_TAG}" > "${ASSET_DIR}/geoip.version.txt"
          echo -n "${GEOSITE_TAG}" > "${ASSET_DIR}/geosite.version.txt"

          curl -fLSs "https://github.com/SagerNet/sing-geoip/releases/download/${GEOIP_TAG}/geoip.db" -o "${ASSET_DIR}/geoip.db"
          curl -fLSs "https://github.com/SagerNet/sing-geosite/releases/download/${GEOSITE_TAG}/geosite.db" -o "${ASSET_DIR}/geosite.db"
          xz -z -9 -f "${ASSET_DIR}/geoip.db"
          xz -z -9 -f "${ASSET_DIR}/geosite.db"

          echo "Bundled geo assets:"
          ls -lh "${ASSET_DIR}"

      - name: Switch to JDK 21 (Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ env.AEROBOX_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          AEROBOX_VERSION_NAME: ${{ env.AEROBOX_VERSION_NAME }}
          AEROBOX_VERSION_CODE: ${{ env.AEROBOX_VERSION_CODE }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          EXTRA_ARGS+=(
            "-PAEROBOX_VERSION_NAME=${AEROBOX_VERSION_NAME}"
            "-PAEROBOX_VERSION_CODE=${AEROBOX_VERSION_CODE}"
          )
          if [ -n "${KEYSTORE_PATH:-}" ]; then
            EXTRA_ARGS+=(
              "-Pandroid.injected.signing.store.file=${KEYSTORE_PATH}"
              "-Pandroid.injected.signing.store.password=${KEYSTORE_PASSWORD}"
              "-Pandroid.injected.signing.key.alias=${KEY_ALIAS}"
              "-Pandroid.injected.signing.key.password=${KEY_PASSWORD}"
            )
          fi
          gradle --stacktrace :app:assembleRelease "${EXTRA_ARGS[@]}" 2>&1 | tee "${RUNNER_TEMP}/gradle-build.log"

      - name: Rename APKs (NekoBox style)
        env:
          AEROBOX_VERSION_NAME: ${{ env.AEROBOX_VERSION_NAME }}
        run: |
          set -euo pipefail
          SRC_DIR="${GITHUB_WORKSPACE}/app/build/outputs/apk/release"
          DIST_DIR="${SRC_DIR}/dist"
          mkdir -p "${DIST_DIR}"
          shopt -s nullglob
          APKS=("${SRC_DIR}"/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "No APK files found in ${SRC_DIR}" >&2
            exit 1
          fi

          for apk in "${APKS[@]}"; do
            filename="$(basename "${apk}")"
            abi="universal"
            case "${filename}" in
              *arm64-v8a*) abi="arm64-v8a" ;;
              *armeabi-v7a*) abi="armeabi-v7a" ;;
              *x86_64*) abi="x86_64" ;;
              *x86*) abi="x86" ;;
            esac
            cp -f "${apk}" "${DIST_DIR}/AeroBox-${AEROBOX_VERSION_NAME}-${abi}.apk"
          done

          echo "Renamed APK outputs:"
          ls -la "${DIST_DIR}"

      - name: Debug logs and directory tree on failure
        if: failure()
        run: |
          set +e
          echo "========== libbox build log =========="
          if [ -f "${RUNNER_TEMP}/libbox-build.log" ]; then
            cat "${RUNNER_TEMP}/libbox-build.log"
          else
            echo "No libbox build log found."
          fi

          echo "========== gradle build log =========="
          if [ -f "${RUNNER_TEMP}/gradle-build.log" ]; then
            cat "${RUNNER_TEMP}/gradle-build.log"
          else
            echo "No gradle build log found."
          fi

          echo "========== sing-box directory tree =========="
          if [ -d "${RUNNER_TEMP}/sing-box" ]; then
            find "${RUNNER_TEMP}/sing-box" -maxdepth 4 -print | sort
          else
            echo "No sing-box directory found."
          fi

          echo "========== app/libs =========="
          ls -la "${GITHUB_WORKSPACE}/app/libs" || true

          echo "========== app/build/outputs =========="
          if [ -d "${GITHUB_WORKSPACE}/app/build/outputs" ]; then
            find "${GITHUB_WORKSPACE}/app/build/outputs" -maxdepth 5 -print | sort
          else
            echo "No app/build/outputs directory found."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aerobox-release-${{ env.AEROBOX_VERSION_NAME || github.ref_name || github.run_number }}
          path: |
            app/build/outputs/apk/release/dist/*.apk
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: AeroBox-${{ env.AEROBOX_VERSION_NAME }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/dist/*.apk
