name: Tag Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: 29.0.14206865
      GOMOBILE_VERSION: v0.1.12
      LIBBOX_BUILD_TAGS: with_quic,with_utls

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "~1.25"
          cache: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Resolve latest stable sing-box release
        run: |
          set -euo pipefail
          SING_BOX_VERSION="$(
            curl -fsSL "https://api.github.com/repos/SagerNet/sing-box/releases/latest" \
              | grep '"tag_name":' \
              | sed -E 's/.*"([^"]+)".*/\1/'
          )"
          if [ -z "${SING_BOX_VERSION}" ]; then
            echo "::error::Failed to resolve latest sing-box version"
            exit 1
          fi
          echo "SING_BOX_VERSION=${SING_BOX_VERSION}" >> "${GITHUB_ENV}"
          echo "Resolved sing-box version: ${SING_BOX_VERSION}"

      - name: Build libbox.aar
        run: |
          set -euo pipefail

          # Install gomobile / gobind (same version as SFA official)
          go install github.com/sagernet/gomobile/cmd/gomobile@${GOMOBILE_VERSION}
          go install github.com/sagernet/gomobile/cmd/gobind@${GOMOBILE_VERSION}
          export PATH="$(go env GOPATH)/bin:${PATH}"

          # Clone sing-box source at the resolved stable tag
          git clone --depth 1 --branch "${SING_BOX_VERSION}" \
            https://github.com/SagerNet/sing-box.git "${RUNNER_TEMP}/sing-box"
          cd "${RUNNER_TEMP}/sing-box"

          SING_VERSION="${SING_BOX_VERSION#v}"
          echo "Building libbox ${SING_VERSION} with tags: ${LIBBOX_BUILD_TAGS}"
          if [[ ",${LIBBOX_BUILD_TAGS}," == *",with_clash_api,"* ]]; then
            echo "::error::with_clash_api should not be present in LIBBOX_BUILD_TAGS after the runtime-log patch"
            exit 1
          fi

          # Current sing-box upstream treats `PlatformLogWriter != nil` as a reason to enable
          # extra services automatically. AeroBox only uses PlatformLogWriter for runtime log
          # callbacks, and does not depend on the Clash API gRPC surface or cache-file side
          # effects. Keep these patches explicit and fail loudly if upstream refactors the
          # target blocks.
          python3 - <<'PY'
          from pathlib import Path

          path = Path("box.go")
          text = path.read_text()
          cache_old = (
              "\tif experimentalOptions.CacheFile != nil && experimentalOptions.CacheFile.Enabled || options.PlatformLogWriter != nil {\n"
              "\t\tneedCacheFile = true\n"
              "\t}\n"
          )
          cache_new = (
              "\tif experimentalOptions.CacheFile != nil && experimentalOptions.CacheFile.Enabled {\n"
              "\t\tneedCacheFile = true\n"
              "\t}\n"
          )
          clash_old = (
              "\tif experimentalOptions.ClashAPI != nil || options.PlatformLogWriter != nil {\n"
              "\t\tneedClashAPI = true\n"
              "\t}\n"
          )
          clash_new = (
              "\tif experimentalOptions.ClashAPI != nil {\n"
              "\t\tneedClashAPI = true\n"
              "\t}\n"
          )

          cache_count = text.count(cache_old)
          if cache_count != 1:
              raise SystemExit(
                  f"Failed to patch needCacheFile condition in box.go: expected exactly 1 match, found {cache_count}. "
                  "Review upstream sing-box box.go before releasing."
              )
          clash_count = text.count(clash_old)
          if clash_count != 1:
              raise SystemExit(
                  f"Failed to patch needClashAPI condition in box.go: expected exactly 1 match, found {clash_count}. "
                  "Review upstream sing-box box.go before releasing."
              )
          patched = text.replace(cache_old, cache_new, 1).replace(clash_old, clash_new, 1)
          if cache_old in patched or cache_new not in patched:
              raise SystemExit("Patch verification failed for box.go needCacheFile condition")
          if clash_old in patched or clash_new not in patched:
              raise SystemExit("Patch verification failed for box.go needClashAPI condition")
          path.write_text(patched)
          PY

          echo "--- patched box.go PlatformLogWriter conditions ---"
          grep -n "needCacheFile\\|needClashAPI" box.go
          python3 - <<'PY'
          from pathlib import Path

          text = Path("box.go").read_text()
          forbidden = [
              "\tif experimentalOptions.CacheFile != nil && experimentalOptions.CacheFile.Enabled || options.PlatformLogWriter != nil {\n",
              "\tif experimentalOptions.ClashAPI != nil || options.PlatformLogWriter != nil {\n",
          ]
          for old in forbidden:
              if old in text:
                  raise SystemExit(
                      "PlatformLogWriter still affects needCacheFile/needClashAPI in patched box.go"
                  )
          print("--- remaining PlatformLogWriter references ---")
          for line_no, line in enumerate(text.splitlines(), 1):
              if "PlatformLogWriter" in line:
                  print(f"{line_no}:{line}")
          PY

          cat > experimental/libbox/urltest_export.go <<'EOF'
          package libbox

          import (
              "context"
              "time"

              box "github.com/sagernet/sing-box"
              "github.com/sagernet/sing-box/common/urltest"
              "github.com/sagernet/sing-box/option"
              E "github.com/sagernet/sing/common/exceptions"
          )

          func URLTestOutbound(configContent string, outboundTag string, testURL string, timeout int32) (int32, error) {
              ctx := baseContext(nil)
              options, err := parseConfig(ctx, configContent)
              if err != nil {
                  return 0, E.Cause(err, "parse config")
              }

              ctx, cancel := context.WithCancel(ctx)
              defer cancel()

              if outboundTag == "" {
                  outboundTag = "proxy"
              }
              if options.Route == nil {
                  options.Route = &option.RouteOptions{}
              }
              options.Route.Final = outboundTag

              instance, err := box.New(box.Options{
                  Context: ctx,
                  Options: options,
              })
              if err != nil {
                  return 0, E.Cause(err, "create box")
              }
              defer instance.Close()

              if err = instance.Start(); err != nil {
                  return 0, E.Cause(err, "start box")
              }

              outbound, loaded := instance.Outbound().Outbound(outboundTag)
              if !loaded || outbound == nil {
                  outbound = instance.Outbound().Default()
              }
              if outbound == nil {
                  return 0, E.New("outbound not available: ", outboundTag)
              }

              testCtx := ctx
              if timeout > 0 {
                  var timeoutCancel context.CancelFunc
                  testCtx, timeoutCancel = context.WithTimeout(ctx, time.Duration(timeout)*time.Millisecond)
                  defer timeoutCancel()
              }

              if testURL == "" {
                  testURL = "http://cp.cloudflare.com/"
              }
              delay, err := urltest.URLTest(testCtx, testURL, outbound)
              if err != nil {
                  return 0, E.Cause(err, "perform url test")
              }
              return int32(delay), nil
          }
          EOF
          gofmt -w experimental/libbox/urltest_export.go
          echo "--- added experimental/libbox/urltest_export.go ---"
          sed -n '1,200p' experimental/libbox/urltest_export.go

          # Build with gomobile bind directly (no need to patch build_libbox)
          mkdir -p "${GITHUB_WORKSPACE}/app/build/libbox"
          gomobile bind -v \
            -o "${GITHUB_WORKSPACE}/app/build/libbox/libbox.aar" \
            -target android \
            -androidapi 31 \
            -javapkg=io.nekohasekai \
            -libname=box \
            -trimpath \
            -buildvcs=false \
            -ldflags "-X github.com/sagernet/sing-box/constant.Version=${SING_VERSION} -s -w -buildid= -checklinkname=0" \
            -tags "${LIBBOX_BUILD_TAGS}" \
            ./experimental/libbox

          AAR_PATH="${GITHUB_WORKSPACE}/app/build/libbox/libbox.aar"
          echo "--- libbox.aar built ---"
          ls -lh "${AAR_PATH}"

          STRIP_DIR="${RUNNER_TEMP}/aar_strip"
          mkdir -p "${STRIP_DIR}"
          unzip -q "${AAR_PATH}" -d "${STRIP_DIR}"
          LLVM_STRIP="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          if [ -x "${LLVM_STRIP}" ]; then
            find "${STRIP_DIR}/jni" -name '*.so' -exec "${LLVM_STRIP}" --strip-unneeded {} \;
            echo "--- .so sizes after strip ---"
            find "${STRIP_DIR}/jni" -name '*.so' -exec du -h {} \; | sort -h
            pushd "${STRIP_DIR}"
            zip -q -r "${AAR_PATH}" .
            popd
          fi

      - name: Validate and decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] || \
             [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || \
             [ -z "${ANDROID_KEY_ALIAS:-}" ] || \
             [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "::error::Missing Android release signing secrets"
            exit 1
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/release.jks"
          echo "AEROBOX_KEYSTORE_PATH=${RUNNER_TEMP}/release.jks" >> "${GITHUB_ENV}"

      - name: Derive version from tag
        run: |
          set -euo pipefail
          echo "AEROBOX_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION_NAME}" ] || [ "${VERSION_NAME}" = "${GITHUB_REF_NAME}" ]; then
            echo "::error::Invalid tag format: ${GITHUB_REF_NAME}. Expected v1.2.3"
            exit 1
          fi

          BASE_VERSION="${VERSION_NAME%%[-+]*}"
          IFS='.' read -r -a VERSION_PARTS <<< "${BASE_VERSION}"
          if [ "${#VERSION_PARTS[@]}" -lt 1 ] || [ "${#VERSION_PARTS[@]}" -gt 3 ]; then
            echo "::error::Tag must be numeric semver, e.g. v1.2.3"
            exit 1
          fi

          for part in "${VERSION_PARTS[@]}"; do
            if ! [[ "${part}" =~ ^[0-9]+$ ]]; then
              echo "::error::Tag must be numeric semver, e.g. v1.2.3"
              exit 1
            fi
          done

          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]:-0}"
          PATCH="${VERSION_PARTS[2]:-0}"
          VERSION_CODE=$((10#${MAJOR} * 10000 + 10#${MINOR} * 100 + 10#${PATCH}))

          echo "AEROBOX_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "AEROBOX_VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"

      - name: Prepare bundled routing rule-set assets
        run: |
          set -euo pipefail
          ASSET_DIR="${GITHUB_WORKSPACE}/app/src/main/assets/sing-box"
          rm -rf "${ASSET_DIR}"
          mkdir -p "${ASSET_DIR}"

          get_latest_release() {
            curl -fsSL "https://api.github.com/repos/$1/releases/latest" \
              | grep '"tag_name":' \
              | sed -E 's/.*"([^"]+)".*/\1/'
          }

          GEOIP_TAG="$(get_latest_release "SagerNet/sing-geoip")"
          GEOSITE_TAG="$(get_latest_release "SagerNet/sing-geosite")"
          if [ -z "${GEOIP_TAG}" ] || [ -z "${GEOSITE_TAG}" ]; then
            echo "::error::Failed to resolve geo asset versions"
            exit 1
          fi

          echo -n "${GEOIP_TAG}" > "${ASSET_DIR}/geoip.version.txt"
          echo -n "${GEOSITE_TAG}" > "${ASSET_DIR}/geosite.version.txt"

          curl -fLSs "https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-cn.srs" \
            -o "${ASSET_DIR}/geoip-cn.srs"
          curl -fLSs "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-cn.srs" \
            -o "${ASSET_DIR}/geosite-cn.srs"
          curl -fLSs "https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-category-ads-all.srs" \
            -o "${ASSET_DIR}/geosite-category-ads-all.srs"

          xz -z -9 -f "${ASSET_DIR}/geoip-cn.srs"
          xz -z -9 -f "${ASSET_DIR}/geosite-cn.srs"
          xz -z -9 -f "${ASSET_DIR}/geosite-category-ads-all.srs"

          echo "Bundled routing assets:"
          ls -lh "${ASSET_DIR}"

      - name: Build unsigned release APK
        env:
          AEROBOX_VERSION_NAME: ${{ env.AEROBOX_VERSION_NAME }}
          AEROBOX_VERSION_CODE: ${{ env.AEROBOX_VERSION_CODE }}
        run: |
          set -euo pipefail
          EXTRA_ARGS=(
            "-PAEROBOX_VERSION_NAME=${AEROBOX_VERSION_NAME}"
            "-PAEROBOX_VERSION_CODE=${AEROBOX_VERSION_CODE}"
          )
          gradle --stacktrace :app:assembleRelease "${EXTRA_ARGS[@]}"

      - name: Sign release APKs (v3 only)
        env:
          KEYSTORE_PATH: ${{ env.AEROBOX_KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          SRC_DIR="${GITHUB_WORKSPACE}/app/build/outputs/apk/release"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/36.0.0/apksigner"
          if [ ! -x "${APKSIGNER}" ]; then
            echo "::error::apksigner not found at ${APKSIGNER}"
            exit 1
          fi

          shopt -s nullglob
          APKS=("${SRC_DIR}"/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No APK files found in ${SRC_DIR}"
            exit 1
          fi

          for apk in "${APKS[@]}"; do
            signed_apk="${apk%.apk}-signed.apk"
            "${APKSIGNER}" sign \
              --ks "${KEYSTORE_PATH}" \
              --ks-key-alias "${KEY_ALIAS}" \
              --ks-pass env:KEYSTORE_PASSWORD \
              --key-pass env:KEY_PASSWORD \
              --v1-signing-enabled false \
              --v2-signing-enabled false \
              --v3-signing-enabled true \
              --v4-signing-enabled false \
              --out "${signed_apk}" \
              "${apk}"

            mv -f "${signed_apk}" "${apk}"
          done

      - name: Rename APKs
        env:
          AEROBOX_VERSION_NAME: ${{ env.AEROBOX_VERSION_NAME }}
        run: |
          set -euo pipefail
          SRC_DIR="${GITHUB_WORKSPACE}/app/build/outputs/apk/release"
          DIST_DIR="${SRC_DIR}/dist"
          mkdir -p "${DIST_DIR}"
          shopt -s nullglob
          APKS=("${SRC_DIR}"/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No APK files found in ${SRC_DIR}"
            exit 1
          fi

          for apk in "${APKS[@]}"; do
            filename="$(basename "${apk}")"
            abi="universal"
            case "${filename}" in
              *arm64-v8a*) abi="arm64-v8a" ;;
              *armeabi-v7a*) abi="armeabi-v7a" ;;
              *x86_64*) abi="x86_64" ;;
              *x86*) abi="x86" ;;
            esac
            cp -f "${apk}" "${DIST_DIR}/AeroBox-${AEROBOX_VERSION_NAME}-${abi}.apk"
          done

          echo "Renamed APK outputs:"
          ls -la "${DIST_DIR}"

      - name: Debug logs on failure
        if: failure()
        run: |
          set +e
          echo "========== libbox.aar =========="
          ls -la "${GITHUB_WORKSPACE}/app/build/libbox/" || true
          echo "========== app/build/outputs =========="
          if [ -d "${GITHUB_WORKSPACE}/app/build/outputs" ]; then
            find "${GITHUB_WORKSPACE}/app/build/outputs" -maxdepth 5 -print | sort
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aerobox-release-${{ env.AEROBOX_VERSION_NAME || github.ref_name || github.run_number }}
          path: |
            app/build/outputs/apk/release/dist/*.apk
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.AEROBOX_TAG || github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/dist/*.apk
