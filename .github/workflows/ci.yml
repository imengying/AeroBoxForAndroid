name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

permissions:
  contents: read

concurrency:
  group: build-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANDROID_NDK_VERSION: 29.0.14206865
      GOMOBILE_VERSION: v0.1.12
      LIBBOX_BUILD_TAGS: with_quic,with_utls,with_v2ray_api

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
          cache: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.3.1"

      - name: Set up Android SDK
        run: bash .github/scripts/setup-android-sdk.sh

      - name: Install required Android SDK packages
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            echo "::error::sdkmanager not found at ${SDKMANAGER}"
            exit 1
          fi
          yes | "${SDKMANAGER}" --licenses >/dev/null
          "${SDKMANAGER}" "platforms;android-36" "build-tools;36.0.0" "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Resolve latest stable sing-box release
        run: |
          set -euo pipefail
          SING_BOX_VERSION="$(
            curl -fsSL "https://api.github.com/repos/SagerNet/sing-box/releases/latest" \
              | grep '"tag_name":' \
              | sed -E 's/.*"([^"]+)".*/\1/'
          )"
          if [ -z "${SING_BOX_VERSION}" ]; then
            echo "::error::Failed to resolve latest sing-box version"
            exit 1
          fi
          echo "SING_BOX_VERSION=${SING_BOX_VERSION}" >> "${GITHUB_ENV}"
          echo "Resolved sing-box version: ${SING_BOX_VERSION}"

      - name: Build libbox.aar
        run: bash .github/scripts/build-libbox.sh

      - name: Prepare bundled routing rule-set assets
        run: bash .github/scripts/prepare-geo-assets.sh

      - name: Build unsigned release APK
        run: |
          set -euo pipefail
          gradle --stacktrace :app:assembleRelease

      - name: Debug logs on failure
        if: failure()
        run: |
          set +e
          echo "========== libbox.aar =========="
          ls -la "${GITHUB_WORKSPACE}/app/build/libbox/" || true
          echo "========== app/build/outputs =========="
          if [ -d "${GITHUB_WORKSPACE}/app/build/outputs" ]; then
            find "${GITHUB_WORKSPACE}/app/build/outputs" -maxdepth 5 -print | sort
          fi
