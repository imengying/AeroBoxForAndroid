name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"

permissions:
  contents: read

concurrency:
  group: build-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANDROID_NDK_VERSION: 29.0.14206865
      GOMOBILE_VERSION: v0.1.12
      LIBBOX_BUILD_TAGS: with_gvisor,with_quic,with_utls,with_v2ray_api,with_naive_outbound

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "~1.25"
          cache: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"

      - name: Set up Android SDK
        run: bash .github/scripts/setup-android-sdk.sh

      - name: Install required Android SDK packages
        run: bash .github/scripts/install-android-packages.sh

      - name: Resolve latest stable sing-box release
        run: bash .github/scripts/resolve-sing-box-version.sh

      - name: Build libbox.aar
        run: bash .github/scripts/build-libbox.sh

      - name: Prepare bundled routing rule-set assets
        run: bash .github/scripts/prepare-geo-assets.sh

      - name: Build unsigned release APK
        run: |
          set -euo pipefail
          gradle --stacktrace :app:assembleRelease

      - name: Build installable debug APK
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          gradle --stacktrace :app:assembleDebug

      - name: Prepare debug APK artifacts
        if: github.event_name != 'pull_request'
        env:
          CI_REF_NAME: ${{ github.ref_name }}
          CI_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SRC_DIR="${GITHUB_WORKSPACE}/app/build/outputs/apk/debug"
          DIST_DIR="${SRC_DIR}/dist"
          mkdir -p "${DIST_DIR}"

          shopt -s nullglob
          APKS=("${SRC_DIR}"/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No debug APK files found in ${SRC_DIR}"
            exit 1
          fi

          SHORT_SHA="${CI_SHA::7}"
          SAFE_REF="$(printf '%s' "${CI_REF_NAME}" | tr '/:@' '---')"

          for apk in "${APKS[@]}"; do
            filename="$(basename "${apk}")"
            abi="universal"
            case "${filename}" in
              *arm64-v8a*) abi="arm64-v8a" ;;
              *armeabi-v7a*) abi="armeabi-v7a" ;;
              *x86_64*) abi="x86_64" ;;
              *x86*) abi="x86" ;;
            esac
            cp -f "${apk}" "${DIST_DIR}/AeroBox-${SAFE_REF}-${SHORT_SHA}-${abi}-debug.apk"
          done

          echo "Prepared debug APK outputs:"
          ls -la "${DIST_DIR}"

      - name: Debug logs on failure
        if: failure()
        run: |
          set +e
          echo "========== libbox.aar =========="
          ls -la "${GITHUB_WORKSPACE}/app/build/libbox/" || true
          echo "========== app/build/outputs =========="
          if [ -d "${GITHUB_WORKSPACE}/app/build/outputs" ]; then
            find "${GITHUB_WORKSPACE}/app/build/outputs" -maxdepth 5 -print | sort
          fi

      - name: Upload installable debug APKs
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: aerobox-ci-debug-${{ github.ref_name }}-${{ github.run_number }}
          path: app/build/outputs/apk/debug/dist/*.apk
          if-no-files-found: error
